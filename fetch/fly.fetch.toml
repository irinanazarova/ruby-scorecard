# Throwaway worker app (no HTTP service) that just runs the coverage probe once.
# The build context + dockerfile are passed on the CLI (see fetch/run-on-fly.sh) so COPY
# can reach scripts/ and data/ at the repo root.
app = "ruby-scorecard-fetch"
primary_region = "ams"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
