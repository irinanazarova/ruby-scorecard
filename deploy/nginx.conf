server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # long-cache the fingerprint-free assets modestly; HTML stays fresh
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
  }

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
