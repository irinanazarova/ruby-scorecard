server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Assets carry a content-hash query (?v=...), so they're safe to cache hard and immutably.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # HTML must always revalidate, so a deploy is picked up immediately (and brings fresh ?v= asset URLs).
  location ~* \.html$ {
    add_header Cache-Control "no-cache";
  }

  location = / {
    add_header Cache-Control "no-cache";
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
